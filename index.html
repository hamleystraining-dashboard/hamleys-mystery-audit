<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Hamleys Mystery Audit Dashboard</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><div id="nav"></div>
<main><div class="title"><div><h1>Leadership Dashboard</h1><div class="small">Mystery Audit performance, trends and action closure</div></div><div class="small" id="updated"></div></div>
<div class="card filters">
<div class="field"><label>ROM</label><select id="rom"></select></div><div class="field"><label>RM</label><select id="rm"></select></div><div class="field"><label>SD</label><select id="sd"></select></div><div class="field"><label>Store</label><select id="store"></select></div><div class="field"><label>From</label><input id="from" type="date"></div><div class="field"><label>To</label><input id="to" type="date"></div>
<div class="field"><label>Section</label><select id="section"></select></div><div class="field"><label>&nbsp;</label><button class="secondary" onclick="clearFilters()">Clear filters</button></div></div>
<div class="tabs" id="tabs"></div><div class="kpis" id="kpis"></div>
<div class="grid2"><div class="card"><h2>Audit Trend</h2><div class="chartbox"><canvas id="trend"></canvas></div></div><div class="card"><h2>Section Performance</h2><div id="heat"></div></div></div>
<div class="grid2"><div class="card"><h2>Latest Audit — Areas of Improvement</h2><div id="remark"></div></div><div class="card"><h2>Action Closure</h2><div id="actionSummary"></div></div></div>
<div class="card"><h2>Performance Detail</h2><div style="overflow:auto"><table class="data"><thead><tr><th>Entity</th><th>Audits</th><th>Avg Score</th><th>Latest</th><th>Trend</th><th>Open Cases</th></tr></thead><tbody id="detail"></tbody></table></div></div>
</main><script src="seed-data.js"></script><script src="app.js"></script><script>
document.getElementById('nav').innerHTML=nav('dash');let view='Leadership Overview',chart;
const ids=['rom','rm','sd','store','from','to','section'];
function opts(id,vals,label){document.getElementById(id).innerHTML=`<option value="">All ${label}</option>`+[...new Set(vals.filter(Boolean))].sort().map(x=>`<option>${esc(x)}</option>`).join('')}
function init(){opts('rom',DB.stores.map(x=>x.rom),'ROMs');opts('rm',DB.stores.map(x=>x.rm),'RMs');opts('sd',DB.stores.map(x=>x.sd),'SDs');opts('store',DB.stores.map(x=>x.storeName),'Stores');opts('section',SECTIONS,'Sections');
document.getElementById('tabs').innerHTML=['Leadership Overview','Store Wise','SD Wise','ROM Wise','RM Wise'].map(x=>`<button class="tab ${x===view?'active':''}" onclick="setView('${x}')">${x}</button>`).join('');
ids.forEach(id=>document.getElementById(id).addEventListener('change',render));render()}
function setView(v){view=v;init()}function clearFilters(){ids.forEach(x=>document.getElementById(x).value='');render()}
function filtered(){let s=DB.stores.filter(x=>(!rom.value||x.rom===rom.value)&&(!rm.value||x.rm===rm.value)&&(!sd.value||x.sd===sd.value)&&(!store.value||x.storeName===store.value));let codes=new Set(s.map(x=>x.storeCode));return DB.audits.filter(a=>codes.has(a.storeCode)&&(!from.value||a.auditDate>=from.value)&&(!to.value||a.auditDate<=to.value))}
function entityKey(a){let s=DB.stores.find(x=>x.storeCode===a.storeCode)||{};return view==='Store Wise'?s.storeName:view==='SD Wise'?s.sd:view==='ROM Wise'?s.rom:view==='RM Wise'?s.rm:'Network'}
function render(){let a=filtered(),sectionV=section.value;let vals=a.map(x=>sectionV?(x.sections?.[sectionV]??null):x.overall).filter(x=>x!=null);let avg=vals.length?vals.reduce((p,c)=>p+c,0)/vals.length:0;let low=vals.filter(x=>x<80).length;let critical=vals.filter(x=>x<60).length;let cases=DB.cases;let open=cases.filter(x=>x.status!=='Completed').length;
kpis.innerHTML=[['Average Score',avg.toFixed(1)+'%'],['Audits',a.length],['Below 80%',low],['Below 60%',critical],['Open HR Cases',open]].map(x=>`<div class="card kpi"><div class="small">${x[0]}</div><div class="value ${typeof x[1]==='string'&&parseFloat(x[1])<60?'bad':''}">${x[1]}</div></div>`).join('');
let groups={};a.forEach(x=>{let k=entityKey(x);(groups[k]??=[]).push(x)});let points=Object.entries(groups).flatMap(([k,arr])=>arr.map(x=>({k,d:x.auditDate,v:sectionV?(x.sections?.[sectionV]??null):x.overall}))).filter(x=>x.v!=null).sort((x,y)=>x.d.localeCompare(y.d));
if(chart)chart.destroy();chart=new Chart(document.getElementById('trend'),{type:'line',data:{labels:points.map(x=>x.d),datasets:[{label:sectionV||'Overall Score',data:points.map(x=>x.v),tension:.25}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100}}}});
let sec=SECTIONS.map(s=>{let v=a.map(x=>x.sections?.[s]).filter(x=>x!=null);return [s,v.length?v.reduce((p,c)=>p+c,0)/v.length:null]});heat.innerHTML=`<table class="heat">${sec.map(x=>`<tr><td>${x[0]}</td><td class="score ${x[1]==null?'':scoreClass(x[1])}">${x[1]==null?'—':x[1].toFixed(1)+'%'}</td></tr>`).join('')}</table>`;
let latest=[...a].filter(x=>x.remarks).sort((x,y)=>y.auditDate.localeCompare(x.auditDate))[0];remark.innerHTML=latest?`<div class="remark"><b>${esc((DB.stores.find(s=>s.storeCode===latest.storeCode)||{}).storeName||latest.storeCode)} · ${latest.auditDate}</b><br><br>${esc(latest.remarks)}</div>`:'<div class="small">No improvement remarks available for the current selection.</div>';
let completed=cases.filter(x=>x.status==='Completed').length;actionSummary.innerHTML=`<div class="value" style="font-size:32px;font-weight:800">${cases.length?Math.round(completed/cases.length*100):0}%</div><div class="small">Cases closed</div><br><div>${completed} completed · ${cases.length-completed} open</div>`;
detail.innerHTML=Object.entries(groups).map(([k,arr])=>{arr.sort((x,y)=>x.auditDate.localeCompare(y.auditDate));let av=arr.reduce((p,c)=>p+c+c.overall,0)/arr.length,lat=arr[arr.length-1].overall,delta=arr.length>1?lat-arr[arr.length-2].overall:0;return `<tr><td><b>${esc(k)}</b></td><td>${arr.length}</td><td class="${scoreClass(av)}">${av.toFixed(1)}%</td><td>${lat.toFixed(1)}%</td><td class="${delta<0?'bad':'good'}">${delta>=0?'+':''}${delta.toFixed(1)}</td><td>${open}</td></tr>`}).join('')||'<tr><td colspan="6">No data for selection.</td></tr>';updated.textContent='Data stored in this browser · V1 prototype'}
init();
</script></body></html>
