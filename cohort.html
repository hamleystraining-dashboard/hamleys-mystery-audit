<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Cohort · Hamleys Mystery Audit Intelligence</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title">Store-wise Cohort</h1>
        <div class="page-sub">Filter audits by RM, ROM, SD, store and score threshold</div>
      </div>
      <div class="seg-toggle" id="verticalToggle">
        <button data-v="retail" class="active retail">Retail</button>
        <button data-v="play" class="play">Play</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-field"><label>RM</label><select id="fRm"></select></div>
      <div class="filter-field"><label>ROM</label><select id="fRom"></select></div>
      <div class="filter-field"><label>SD</label><select id="fSd"></select></div>
      <div class="filter-field"><label>Store</label><select id="fStore"></select></div>
      <div class="filter-field"><label>From</label><input type="date" id="fFrom"></div>
      <div class="filter-field"><label>To</label><input type="date" id="fTo"></div>
      <div class="filter-field">
        <label>Threshold</label>
        <div class="chip-toggle">
          <button data-t="all" class="active">All</button>
          <button data-t="80">&lt; 80</button>
          <button data-t="60">&lt; 60</button>
        </div>
      </div>
      <button class="filter-clear" id="clearAll" style="margin-left:auto;">Clear all filters</button>
    </div>

    <div class="card">
      <div class="section-head">
        <h3 id="tableTitle">Latest 10 Audits Uploaded</h3>
        <span class="tag neutral" id="resultCount">0 results</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th data-k="date">Audit Date</th>
            <th data-k="storeNameResolved">Store</th>
            <th data-k="storeCode">Code</th>
            <th data-k="score">Score</th>
            <th data-k="rm">RM</th>
            <th data-k="rom">ROM</th>
            <th data-k="sd">SD</th>
            <th data-k="wave">Wave</th>
            <th>Trend</th>
          </tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/ui.js"></script>
<script>
let vertical = "retail";
let threshold = "all";
let sortKey = "date", sortDir = -1;
let defaultView = true; // latest-10 mode until a filter is touched

async function boot() {
  renderSidebar("cohort.html", false);
  try {
    await HMAI.init();
  } catch (err) {
    showLoadError(err);
    return;
  }

  applyUrlParams();

  document.querySelectorAll("#verticalToggle button").forEach(b => {
    b.addEventListener("click", () => {
      vertical = b.dataset.v;
      document.querySelectorAll("#verticalToggle button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      populateFilterOptions();
      render();
    });
  });

  document.getElementById("fRm").addEventListener("change", () => { onHierarchyChange("rm"); defaultView = false; render(); });
  document.getElementById("fRom").addEventListener("change", () => { onHierarchyChange("rom"); defaultView = false; render(); });
  document.getElementById("fSd").addEventListener("change", () => { onHierarchyChange("sd"); defaultView = false; render(); });
  ["fStore","fFrom","fTo"].forEach(id => {
    document.getElementById(id).addEventListener("change", () => { defaultView = false; render(); });
  });
  document.querySelectorAll(".chip-toggle button").forEach(b => {
    b.addEventListener("click", () => {
      threshold = b.dataset.t;
      document.querySelectorAll(".chip-toggle button").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      defaultView = false;
      render();
    });
  });
  document.getElementById("clearAll").addEventListener("click", () => {
    ["fRm","fRom","fSd","fStore","fFrom","fTo"].forEach(id => document.getElementById(id).value = "");
    populateFilterOptions();
    threshold = "all";
    document.querySelectorAll(".chip-toggle button").forEach(x => x.classList.remove("active"));
    document.querySelector(".chip-toggle button[data-t=all]").classList.add("active");
    defaultView = true;
    render();
  });
  document.querySelectorAll("thead th[data-k]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.k;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
      render();
    });
  });

  populateFilterOptions();
  render();
}

function applyUrlParams() {
  const params = new URLSearchParams(location.search);
  const v = params.get("v");
  if (v === "retail" || v === "play") {
    vertical = v;
    document.querySelectorAll("#verticalToggle button").forEach(b => b.classList.toggle("active", b.dataset.v === vertical));
  }
  const rm = params.get("rm"), rom = params.get("rom"), sd = params.get("sd");
  if (rm || rom || sd) {
    populateFilterOptions();
    if (rm) { document.getElementById("fRm").value = rm; onHierarchyChange("rm"); }
    if (rom) { document.getElementById("fRom").value = rom; onHierarchyChange("rom"); }
    if (sd) { document.getElementById("fSd").value = sd; onHierarchyChange("sd"); }
    defaultView = false;
  }
}

// Populates every level fresh from scratch (used on load / vertical switch / clear-all).
function populateFilterOptions() {
  fillSelect(document.getElementById("fRm"), HMAI.cascadingValues(vertical, "rm", {}), "All RMs");
  fillSelect(document.getElementById("fRom"), HMAI.cascadingValues(vertical, "rom", {}), "All ROMs");
  fillSelect(document.getElementById("fSd"), HMAI.cascadingValues(vertical, "sd", {}), "All SDs");
  fillSelect(document.getElementById("fStore"), HMAI.cascadingValues(vertical, "storeName", {}), "All Stores");
}

// Re-narrows the options below the level that just changed, keeping their
// current selection if it's still valid, and clears anything that isn't.
function onHierarchyChange(changedLevel) {
  const rm = document.getElementById("fRm").value || null;
  const rom = document.getElementById("fRom").value || null;
  const sd = document.getElementById("fSd").value || null;

  if (changedLevel === "rm") {
    const romOpts = HMAI.cascadingValues(vertical, "rom", { rm });
    fillSelect(document.getElementById("fRom"), romOpts, "All ROMs");
    if (rom && !romOpts.includes(rom)) document.getElementById("fRom").value = "";
    const sdOpts = HMAI.cascadingValues(vertical, "sd", { rm, rom: document.getElementById("fRom").value || null });
    fillSelect(document.getElementById("fSd"), sdOpts, "All SDs");
    document.getElementById("fSd").value = "";
    const storeOpts = HMAI.cascadingValues(vertical, "storeName", { rm });
    fillSelect(document.getElementById("fStore"), storeOpts, "All Stores");
    document.getElementById("fStore").value = "";
  } else if (changedLevel === "rom") {
    const sdOpts = HMAI.cascadingValues(vertical, "sd", { rm, rom });
    fillSelect(document.getElementById("fSd"), sdOpts, "All SDs");
    if (sd && !sdOpts.includes(sd)) document.getElementById("fSd").value = "";
    const storeOpts = HMAI.cascadingValues(vertical, "storeName", { rm, rom });
    fillSelect(document.getElementById("fStore"), storeOpts, "All Stores");
    document.getElementById("fStore").value = "";
  } else if (changedLevel === "sd") {
    const storeOpts = HMAI.cascadingValues(vertical, "storeName", { rm, rom, sd });
    fillSelect(document.getElementById("fStore"), storeOpts, "All Stores");
    document.getElementById("fStore").value = "";
  }
}

function currentFilters() {
  const store = document.getElementById("fStore").value;
  return {
    rm: document.getElementById("fRm").value || null,
    rom: document.getElementById("fRom").value || null,
    sd: document.getElementById("fSd").value || null,
    from: document.getElementById("fFrom").value || null,
    to: document.getElementById("fTo").value || null,
    below80: threshold === "80",
    below60: threshold === "60",
    _storeName: store || null,
  };
}

function render() {
  document.querySelector(".seg-toggle").querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.v === vertical));

  let list;
  if (defaultView) {
    list = HMAI.latestPerStore(vertical, 10);
    document.getElementById("tableTitle").textContent = "Latest 10 Audits Uploaded";
  } else {
    const f = currentFilters();
    list = HMAI.filterAudits(vertical, f);
    if (f._storeName) list = list.filter(a => (HMAI.storeMeta(a.storeCode).storeName || a.storeName) === f._storeName);
    document.getElementById("tableTitle").textContent = "Filtered Audit Results";
  }

  list = list.slice().sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === "date") { av = new Date(av); bv = new Date(bv); }
    if (av < bv) return sortDir;
    if (av > bv) return -sortDir;
    return 0;
  });

  document.getElementById("resultCount").textContent = list.length + " results";
  document.getElementById("tableBody").innerHTML = list.map(a => `
    <tr>
      <td>${fmtDate(a.date)}</td>
      <td><strong>${a.storeNameResolved}</strong>${a.unmapped ? ' <span class="tag warn" title="Store code not found in Base Store Data — RM/ROM/SD unknown">Unmapped</span>' : ''}</td>
      <td class="small-muted">${a.storeCode}</td>
      <td>${scorePill(a.score)}</td>
      <td>${a.rm}</td>
      <td>${a.rom}</td>
      <td>${a.sd}</td>
      <td class="small-muted">${a.wave || "—"}</td>
      <td><a class="btn btn-ghost btn-sm" href="trend.html?store=${encodeURIComponent(a.storeCode)}&v=${vertical}">View</a></td>
    </tr>`).join("") || `<tr><td colspan="9" style="text-align:center;color:var(--ink-faint);padding:30px;">No audits match these filters</td></tr>`;
}

boot();
</script>
</body>
</html>
