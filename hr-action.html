<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>HR Actions</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main><div class="title"><div><h1>HR Action Queue</h1><div class="small">Record and close mystery audit disciplinary actions</div></div></div>
<div class="card"><div class="field" style="max-width:320px"><label>HRBP Filter</label><select id="filter"><option value="">All HRBPs</option><option>HRBP - North</option><option>HRBP - South</option><option>HRBP - West</option><option>HRBP - East</option></select></div></div><div id="queue" style="margin-top:16px"></div>
</main><script src="seed-data.js"></script><script src="app.js"></script><script>document.getElementById('nav').innerHTML=nav('hr');filter.onchange=render;
function save(id){let c=DB.cases,i=c.findIndex(x=>x.id===id);c[i].action=document.getElementById('a'+id).value;c[i].actionDate=document.getElementById('d'+id).value;c[i].hrRemarks=document.getElementById('r'+id).value;c[i].status=document.getElementById('s'+id).value;DB.cases=c;render()}
function render(){let c=DB.cases.filter(x=>!filter.value||x.hrbp===filter.value);queue.innerHTML=c.map(x=>`<div class="card" style="margin-bottom:12px"><div class="grid3"><div><b>${esc(x.employeeName)} · ${x.designation}</b><div class="small">${esc(x.employeeCode)} · ${esc(x.storeName)} · ${x.auditDate}</div><br><span class="${scoreClass(x.score)}"><b>Audit Score: ${x.score}%</b></span></div><div><div class="small">POLICY ACTION REQUIRED</div><b>${esc(x.policyAction)}</b><br><br><div class="small">ROM REMARKS</div>${esc(x.romRemarks||'—')}</div><div class="formgrid" style="grid-template-columns:1fr"><select id="a${x.id}"><option ${x.action==='Warning Letter'?'selected':''}>Warning Letter</option><option ${x.action==='Termination'?'selected':''}>Termination</option><option ${x.action==='Incentive Hold'?'selected':''}>Incentive Hold</option><option ${x.action==='PLI Deduction'?'selected':''}>PLI Deduction</option><option ${x.action==='No Action / Exception'?'selected':''}>No Action / Exception</option></select><input id="d${x.id}" type="date" value="${x.actionDate||''}"><textarea id="r${x.id}" placeholder="HR remarks">${esc(x.hrRemarks||'')}</textarea><select id="s${x.id}"><option ${x.status==='Pending HR Action'?'selected':''}>Pending HR Action</option><option ${x.status==='In Progress'?'selected':''}>In Progress</option><option ${x.status==='Completed'?'selected':''}>Completed</option></select><button onclick="save(${x.id})">Save Action</button></div></div></div>`).join('')||'<div class="card">No cases in this queue.</div>'}render();</script></body></html>
