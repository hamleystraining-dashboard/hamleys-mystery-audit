<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Defaulter Upload</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main><div class="title"><div><h1>Defaulter Upload</h1><div class="small">ROM submission portal</div></div></div>
<div class="card"><h2>Create Defaulter Case</h2><div class="formgrid">
<div class="field"><label>ROM</label><select id="rom"></select></div><div class="field"><label>Store</label><select id="store"></select></div><div class="field"><label>Audit Date</label><select id="auditDate"></select></div>
<div class="field"><label>Employee Name</label><input id="employeeName"></div><div class="field"><label>Employee Code</label><input id="employeeCode"></div><div class="field"><label>Designation</label><select id="designation"><option>FC</option><option>SM</option><option>SD</option></select></div>
<div class="field"><label>HRBP</label><select id="hrbp"><option value="">Select HRBP</option><option>HRBP - North</option><option>HRBP - South</option><option>HRBP - West</option><option>HRBP - East</option></select></div><div class="field full"><label>ROM Remarks</label><textarea id="romRemarks" rows="3"></textarea></div><div class="full"><button onclick="submitCase()">Submit to HRBP</button></div></div><div id="msg" class="status"></div></div>
<div class="card" style="margin-top:16px"><h2>Submitted Cases</h2><table class="data"><thead><tr><th>Store</th><th>Audit</th><th>Employee</th><th>Designation</th><th>HRBP</th><th>Status</th></tr></thead><tbody id="cases"></tbody></table></div>
</main><script src="seed-data.js"></script><script src="app.js"></script><script>document.getElementById('nav').innerHTML=nav('def');
function init(){rom.innerHTML='<option value="">Select ROM</option>'+[...new Set(DB.stores.map(x=>x.rom))].sort().map(x=>`<option>${esc(x)}</option>`).join('');rom.onchange=loadStores;store.onchange=loadDates;render()}
function loadStores(){store.innerHTML='<option value="">Select Store</option>'+DB.stores.filter(x=>x.rom===rom.value).map(x=>`<option value="${x.storeCode}">${esc(x.storeName)} (${x.storeCode})</option>`).join('');loadDates()}
function loadDates(){auditDate.innerHTML='<option value="">Select Audit</option>'+DB.audits.filter(x=>x.storeCode===store.value).sort((a,b)=>b.auditDate.localeCompare(a.auditDate)).map(x=>`<option>${x.auditDate}</option>`).join('')}
function policy(a,d){if(!a)return 'Review required';if(a.overall<60)return d==='SD'?'Warning letter / consecutive rule check':d==='SM'?'Warning Letter & No incentive / consecutive rule check':'Termination';if(a.overall<80)return d==='SD'?'Consecutive rule check':d==='SM'?'Warning Letter':'Warning Letter';return 'No policy penalty'}
function submitCase(){if(!rom.value||!store.value||!auditDate.value||!employeeName.value||!employeeCode.value||!hrbp.value)return msg.innerHTML='<span class="bad">Complete all mandatory fields.</span>';let a=DB.audits.find(x=>x.storeCode===store.value&&x.auditDate===auditDate.value),s=DB.stores.find(x=>x.storeCode===store.value),c=DB.cases;c.push({id:Date.now(),rom:rom.value,storeCode:store.value,storeName:s.storeName,auditDate:auditDate.value,score:a?.overall,employeeName:employeeName.value,employeeCode:employeeCode.value,designation:designation.value,hrbp:hrbp.value,romRemarks:romRemarks.value,policyAction:policy(a,designation.value),status:'Pending HR Action',action:'',actionDate:'',hrRemarks:''});DB.cases=c;msg.innerHTML='<span class="good">Case submitted to HR queue. Email notification is deferred to backend phase.</span>';render()}
function render(){cases.innerHTML=DB.cases.slice().reverse().map(x=>`<tr><td>${esc(x.storeName)}</td><td>${x.auditDate}<br><span class="${scoreClass(x.score)}">${x.score}%</span></td><td>${esc(x.employeeName)}<br><span class="small">${esc(x.employeeCode)}</span></td><td>${x.designation}</td><td>${esc(x.hrbp)}</td><td><span class="pill ${x.status==='Completed'?'completed':'pending'}">${x.status}</span></td></tr>`).join('')||'<tr><td colspan="6">No cases submitted.</td></tr>'}init();</script></body></html>
